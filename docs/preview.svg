<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">TKEN One-Click AI Stack preview</title>
  <desc id="desc">A preview of the gateway, ChatGPT-style UI, Claude-style UI, client kits, and deployment targets.</desc>
  <rect width="1280" height="720" fill="#f6f8fb"/>
  <rect x="72" y="58" width="1136" height="604" rx="18" fill="#ffffff" stroke="#d7dee8" stroke-width="2"/>
  <rect x="72" y="58" width="1136" height="86" rx="18" fill="#0f172a"/>
  <text x="112" y="112" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff">TKEN One-Click AI Stack</text>
  <text x="764" y="110" font-family="Arial, sans-serif" font-size="18" fill="#cbd5e1">OpenAI-compatible gateway + Web UIs + client kits</text>

  <rect x="112" y="184" width="310" height="390" rx="14" fill="#f8fafc" stroke="#d7dee8"/>
  <text x="142" y="228" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">One-click install</text>
  <text x="142" y="266" font-family="Arial, sans-serif" font-size="17" fill="#334155">Download zip</text>
  <text x="142" y="302" font-family="Arial, sans-serif" font-size="17" fill="#334155">Double-click START.bat</text>
  <text x="142" y="338" font-family="Arial, sans-serif" font-size="17" fill="#334155">Open local Web UI</text>
  <text x="142" y="374" font-family="Arial, sans-serif" font-size="17" fill="#334155">Paste API key</text>
  <rect x="142" y="426" width="220" height="58" rx="10" fill="#2563eb"/>
  <text x="172" y="462" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">tken-full-stack.zip</text>
  <text x="142" y="528" font-family="Arial, sans-serif" font-size="15" fill="#64748b">Preflight checks Node.js, files, and ports before launch.</text>

  <rect x="466" y="184" width="348" height="390" rx="14" fill="#ffffff" stroke="#d7dee8"/>
  <text x="496" y="228" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Local gateway</text>
  <rect x="496" y="258" width="288" height="54" rx="10" fill="#ecfdf5" stroke="#86efac"/>
  <text x="520" y="292" font-family="Arial, sans-serif" font-size="17" fill="#166534">/v1/chat/completions</text>
  <rect x="496" y="330" width="288" height="54" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="520" y="364" font-family="Arial, sans-serif" font-size="17" fill="#1d4ed8">free-model -> low-cost route</text>
  <rect x="496" y="402" width="288" height="54" rx="10" fill="#fff7ed" stroke="#fdba74"/>
  <text x="520" y="436" font-family="Arial, sans-serif" font-size="17" fill="#9a3412">premium-gpt -> GPT route</text>
  <text x="496" y="514" font-family="Arial, sans-serif" font-size="15" fill="#64748b">Demo mode, admin status page, rate limiting, and production checks included.</text>

  <rect x="858" y="184" width="310" height="390" rx="14" fill="#f8fafc" stroke="#d7dee8"/>
  <text x="888" y="228" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Ready packages</text>
  <text x="888" y="270" font-family="Arial, sans-serif" font-size="17" fill="#334155">ChatGPT-style Web UI</text>
  <text x="888" y="306" font-family="Arial, sans-serif" font-size="17" fill="#334155">Claude-style Web UI</text>
  <text x="888" y="342" font-family="Arial, sans-serif" font-size="17" fill="#334155">Codex client kit</text>
  <text x="888" y="378" font-family="Arial, sans-serif" font-size="17" fill="#334155">OpenClaw client kit</text>
  <text x="888" y="414" font-family="Arial, sans-serif" font-size="17" fill="#334155">Docker / Railway / Render / Vercel</text>
  <rect x="888" y="466" width="210" height="58" rx="10" fill="#0f172a"/>
  <text x="924" y="502" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Unzip and run</text>
</svg>
