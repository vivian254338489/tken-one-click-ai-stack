<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TKEN Claude-Style Web UI</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    :root {
      --accent: #8b4d2c;
      --bg: #fbf7f2;
      --line: #e8d9ca;
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <p class="brand">TKEN Console</p>
      <p class="muted">Standalone Claude-style writing surface for OpenAI-compatible APIs.</p>
      <div class="settings">
        <label>API base URL
          <input id="api-base" autocomplete="off">
        </label>
        <label>API key
          <input id="api-key" type="password" autocomplete="off">
        </label>
        <label>Model
          <select id="model"></select>
        </label>
        <p class="muted">Get a key from <a href="https://www.tken.shop/?utm_source=github&utm_medium=webui_package&utm_campaign=claude_web_runtime">tken.shop</a>.</p>
      </div>
    </aside>
    <main>
      <header>
        <h1>Claude-Style Web UI</h1>
        <p class="muted">A calm interface for longer-form writing, analysis, and comparison.</p>
      </header>
      <section id="messages"></section>
      <form id="chat-form">
        <textarea id="prompt" rows="2" placeholder="Write, analyze, compare..."></textarea>
        <button type="submit">Send</button>
      </form>
    </main>
  </div>
  <script src="/config.js"></script>
  <script src="/web-client.js"></script>
  <script>
    window.bootStandaloneChat({
      systemPrompt: "You are a careful assistant in a Claude-style web UI. Prefer structured, useful answers."
    });
  </script>
</body>
</html>
